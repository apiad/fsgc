# fsgc signature catalog.
#
# Each entry declares:
#   name          — human-readable group name (used as the aggregator's key).
#   pattern       — glob; `**/` prefix matches anywhere in the tree.
#   recovery      — "trivial" (auto-regenerates, offline),
#                   "local"   (rebuilt from local sources, offline),
#                   "network" (requires internet to refetch).
#                   Caps the maximum score: trivial 1.0, local 0.7, network 0.4.
#   min_age_days  — optional; hard cutoff in days. Younger = filtered.
#   sentinels     — optional; at least one must exist inside the directory
#                   for the signature to apply (both at scan and sweep time).
#
# Sort order in the UI follows score = age_factor × recovery_cap, so
# OLD + TRIVIAL surfaces first, YOUNG or NETWORK-bound sinks to the bottom.

signatures:
  # ── Python: build & test caches ─────────────────────────────────────────────
  - name: "Python Bytecode"
    pattern: "**/__pycache__"
    recovery: trivial
    min_age_days: 1   # avoid clobbering an active build/import
  - name: "Pytest Cache"
    pattern: "**/.pytest_cache"
    recovery: trivial
    min_age_days: 1
  - name: "Mypy Cache"
    pattern: "**/.mypy_cache"
    recovery: trivial
    min_age_days: 1
  - name: "Ruff Cache"
    pattern: "**/.ruff_cache"
    recovery: trivial
    min_age_days: 1
  - name: "Tox Environment"
    pattern: "**/.tox"
    recovery: network   # tox builds venvs which need pip install
    min_age_days: 7

  # ── Python: package + interpreter caches (network) ──────────────────────────
  - name: "Python Virtualenv"
    pattern: "**/.venv"
    recovery: network
    min_age_days: 14
    sentinels: ["pyvenv.cfg"]
  - name: "uv Cache"
    pattern: "**/.cache/uv"
    recovery: network
    min_age_days: 7
  - name: "uv Python Interpreters"
    pattern: "**/.local/share/uv/python"
    recovery: network
    min_age_days: 30
  - name: "pip Cache"
    pattern: "**/.cache/pip"
    recovery: network
    min_age_days: 30

  # ── JavaScript / Node ───────────────────────────────────────────────────────
  - name: "Node Dependencies"
    pattern: "**/node_modules"
    recovery: network
    min_age_days: 14
    sentinels: ["package.json"]
  - name: "npm Cache"
    pattern: "**/.npm"
    recovery: network
    min_age_days: 7
  - name: "Yarn Cache"
    pattern: "**/.yarn/cache"
    recovery: network
    min_age_days: 7
  - name: "pnpm Virtual Store"
    pattern: "**/.pnpm-store"
    recovery: network
    min_age_days: 14

  # ── Rust ────────────────────────────────────────────────────────────────────
  - name: "Rust Target"
    pattern: "**/target"
    recovery: local
    min_age_days: 2
    sentinels: ["CACHEDIR.TAG", ".rustc_info.json"]
  - name: "Cargo Registry"
    pattern: "**/.cargo/registry"
    recovery: network
    min_age_days: 60

  # ── Java / JVM ──────────────────────────────────────────────────────────────
  - name: "Maven Repository Cache"
    pattern: "**/.m2/repository"
    recovery: network
    min_age_days: 30
  - name: "Gradle Dependency Cache"
    pattern: "**/.gradle/caches"
    recovery: network
    min_age_days: 30
  - name: "Gradle Wrapper Distributions"
    pattern: "**/.gradle/wrapper/dists"
    recovery: network
    min_age_days: 30

  # ── Go ──────────────────────────────────────────────────────────────────────
  - name: "Go Build Cache"
    pattern: "**/.cache/go-build"
    recovery: local
    min_age_days: 14
  - name: "Go Module Cache"
    pattern: "**/pkg/mod"
    recovery: network
    min_age_days: 30

  # ── Machine Learning model caches ───────────────────────────────────────────
  - name: "Hugging Face Cache"
    pattern: "**/.cache/huggingface"
    recovery: network
    min_age_days: 30
  - name: "PyTorch Hub Cache"
    pattern: "**/.cache/torch"
    recovery: network
    min_age_days: 30
  - name: "TensorFlow Hub Cache"
    pattern: "**/tfhub_modules"
    recovery: network
    min_age_days: 30
  - name: "KaggleHub Cache"
    pattern: "**/.cache/kagglehub"
    recovery: network
    min_age_days: 30

  # ── OS metadata ─────────────────────────────────────────────────────────────
  - name: "macOS Metadata"
    pattern: "**/.DS_Store"
    recovery: trivial
  - name: "Thumbnail Cache"
    pattern: "**/.thumbnails"
    recovery: trivial
    min_age_days: 7
  - name: "System Trash (Files)"
    pattern: "**/.local/share/Trash/files"
    recovery: trivial   # already trash; emptying is the point
    min_age_days: 30
  - name: "System Trash (Info)"
    pattern: "**/.local/share/Trash/info"
    recovery: trivial
    min_age_days: 30

  # ── Browser caches: per-profile (Linux ~/.config/<browser>/<Profile>/…) ────
  # Each browser keeps the bytes per-profile, not in ~/.cache. These are the
  # rules that actually catch multi-GB of recoverable cache.
  - name: "Chrome Profile Cache"
    pattern: "**/.config/google-chrome/*/Cache"
    recovery: trivial
    min_age_days: 7
  - name: "Chrome Profile Code Cache"
    pattern: "**/.config/google-chrome/*/Code Cache"
    recovery: trivial
    min_age_days: 7
  - name: "Chrome Profile GPU Cache"
    pattern: "**/.config/google-chrome/*/GPUCache"
    recovery: trivial
    min_age_days: 7
  - name: "Chrome Service Worker Cache"
    pattern: "**/.config/google-chrome/*/Service Worker/CacheStorage"
    recovery: trivial
    min_age_days: 7
  - name: "Chromium Profile Cache"
    pattern: "**/.config/chromium/*/Cache"
    recovery: trivial
    min_age_days: 7
  - name: "Brave Profile Cache"
    pattern: "**/.config/BraveSoftware/Brave-Browser/*/Cache"
    recovery: trivial
    min_age_days: 7
  - name: "Microsoft Edge Profile Cache"
    pattern: "**/.config/microsoft-edge/*/Cache"
    recovery: trivial
    min_age_days: 7
  - name: "Vivaldi Profile Cache"
    pattern: "**/.config/vivaldi/*/Cache"
    recovery: trivial
    min_age_days: 7
  - name: "Firefox Cache"
    pattern: "**/.cache/mozilla/firefox/*/cache2"
    recovery: trivial
    min_age_days: 7

  # ── Browser caches: legacy ~/.cache/<browser>/ ──────────────────────────────
  - name: "Chrome Default Cache (Linux)"
    pattern: "**/.cache/google-chrome"
    recovery: trivial
    min_age_days: 14
  - name: "Chrome Default Cache (macOS)"
    pattern: "**/Library/Caches/Google/Chrome"
    recovery: trivial
    min_age_days: 14

  # ── Electron desktop apps ───────────────────────────────────────────────────
  - name: "VS Code Cache (Linux)"
    pattern: "**/.config/Code/Cache"
    recovery: trivial
    min_age_days: 14
  - name: "VS Code Code Cache (Linux)"
    pattern: "**/.config/Code/CachedData"
    recovery: trivial
    min_age_days: 14
  - name: "VS Code Cache (macOS)"
    pattern: "**/Library/Application Support/Code/Cache"
    recovery: trivial
    min_age_days: 14
  - name: "Cursor Cache (Linux)"
    pattern: "**/.config/Cursor/Cache"
    recovery: trivial
    min_age_days: 14
  - name: "Slack Cache (Linux)"
    pattern: "**/.config/Slack/Cache"
    recovery: trivial
    min_age_days: 14
  - name: "Slack Cache (macOS)"
    pattern: "**/Library/Application Support/Slack/Cache"
    recovery: trivial
    min_age_days: 14
  - name: "Discord Cache (Linux)"
    pattern: "**/.config/discord/Cache"
    recovery: trivial
    min_age_days: 14
  - name: "Spotify Storage (Linux)"
    pattern: "**/.config/spotify/Storage"
    recovery: trivial
    min_age_days: 30
  - name: "JetBrains Caches"
    pattern: "**/.cache/JetBrains"
    recovery: trivial
    min_age_days: 14

  # ── Containerization / packaging app caches ─────────────────────────────────
  - name: "Snap Cache"
    pattern: "**/.cache/snap"
    recovery: trivial
    min_age_days: 14
  - name: "Flatpak App Caches"
    pattern: "**/.var/app/*/cache"
    recovery: trivial
    min_age_days: 14

  # ── Generic build outputs (local-rebuild, strong sentinels required) ────────
  # Intentionally absent: bare **/bin and **/obj — too dangerous without robust
  # sentinels (would match ~/Workspace/bin/, .venv/bin/, ~/.local/bin/, …).
  # Re-add per-user via ~/.config/fsgc/signatures.yaml if needed.
  - name: "C/C++ Build Output"
    pattern: "**/build"
    recovery: local
    min_age_days: 7
    sentinels: ["*.o", "*.obj", "*.a", "*.lib", "CMakeCache.txt"]
  - name: "Distribution Artifacts"
    pattern: "**/dist"
    recovery: local
    min_age_days: 7
    sentinels: ["*.whl", "*.tar.gz", "*.egg-info"]
